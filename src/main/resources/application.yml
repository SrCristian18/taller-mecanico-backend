spring:
  aplication:
    name: tallerMecanico-backend

  datasource:
    url: jdbc:mysql://db:3306/taller
    username: root
    password: root
    hikari:
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080